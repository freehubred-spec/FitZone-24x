<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGym-24x | Smart Coach</title>
    <style>
        :root { --primary: #ff4757; --dark: #0f0f0f; --card-bg: #1e1e1e; --accent: #2ecc71; --blue: #0984e3; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 15px 10px; background: #000; border-bottom: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .nav-logo { height: 45px; width: auto; border-radius: 5px; }
        .logo-text { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .logo-text span { color: var(--primary); }
        .container { padding: 0; max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        h3 { color: var(--primary); margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; background: #252525; color: white; border: 1px solid #444; margin: 8px 0; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .day-wrapper { margin-bottom: 8px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .day-header { background: #2d3436; padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .day-content { display: none; background: #1a1a1a; padding: 10px; }
        .bmr-res { margin-top: 15px; padding: 10px; border-radius: 8px; background: #111; border-left: 4px solid var(--accent); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://i.ibb.co/PGZ19M1V/smart-gym-logo.jpg" alt="Logo" class="nav-logo">
    <div class="logo-text">Smart Gym-<span>24x</span></div>
</div>

<div class="container">
    <div class="card">
        <h3>📊 BMI Health Checker</h3>
        <div style="display:flex; gap:10px;">
            <input type="number" id="w" placeholder="Weight (kg)">
            <input type="number" id="h" placeholder="Height (cm)">
        </div>
        <button class="btn-main" onclick="calcHealth()">Check Status</button>
        <div id="res" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
    </div>

    <div class="card">
        <h3>🔥 BMR & Daily Calories</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="age" placeholder="Age">
            <select id="gender"><option value="male">Male</option><option value="female">Female</option></select>
        </div>
        <select id="activity">
            <option value="1.2">No Exercise (Office Job)</option>
            <option value="1.375">Light (1-3 days/week)</option>
            <option value="1.55">Moderate (3-5 days/week)</option>
            <option value="1.725">Very Active (Daily gym)</option>
        </select>
        <button class="btn-main" style="background:var(--blue);" onclick="calcBMR()">Calculate Calories</button>
        <div id="bmr-result"></div>
    </div>

    <div class="card">
        <h3>📅 Workout Schedule</h3>
        <div class="day-wrapper">
            <div class="day-header" onclick="toggle('mon')">Monday <span>▼</span></div>
            <div id="mon" class="day-content">Chest & Triceps Workout</div>
        </div>
        <div class="day-wrapper">
            <div class="day-header" onclick="toggle('tue')">Tuesday <span>▼</span></div>
            <div id="tue" class="day-content">Back & Biceps Workout</div>
        </div>
    </div>
</div>

<script>
    // Aapka purana toggle function
    function toggle(id) {
        var x = document.getElementById(id);
        if (x.style.display === "block") { x.style.display = "none"; } 
        else { x.style.display = "block"; }
    }

    // Aapka purana BMI function
    function calcHealth() {
        var w = document.getElementById('w').value;
        var h = document.getElementById('h').value / 100;
        if(w && h) {
            var bmi = (w / (h * h)).toFixed(1);
            document.getElementById('res').innerHTML = "Your BMI: " + bmi;
        }
    }

    // Naya BMR & Calories Tracker function
    function calcBMR() {
        var w = parseFloat(document.getElementById('w').value);
        var h = parseFloat(document.getElementById('h').value);
        var a = parseInt(document.getElementById('age').value);
        var g = document.getElementById('gender').value;
        var act = parseFloat(document.getElementById('activity').value);

        if(!w || !h || !a) {
            alert("Pehle Weight, Height aur Age bharein!");
            return;
        }

        // Mifflin-St Jeor Equation
        var bmr = (g === 'male') ? (10 * w) + (6.25 * h) - (5 * a) + 5 : (10 * w) + (6.25 * h) - (5 * a) - 161;
        var tdee = Math.round(bmr * act);

        document.getElementById('bmr-result').innerHTML = `
            <div class="bmr-res">
                BMR: <b>${Math.round(bmr)} kcal</b><br>
                Daily Calories (TDEE): <b>${tdee} kcal</b>
            </div>`;
    }
</script>

</body>
</html>
