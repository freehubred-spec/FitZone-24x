<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGym-24x</title>
    <style>
        :root { --primary: #ff4757; --dark: #0f0f0f; --card-bg: #1e1e1e; --accent: #2ecc71; }
        body { font-family: sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px; border-bottom: 3px solid var(--primary); margin-bottom: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        h3 { color: var(--primary); margin: 0 0 15px 0; font-size: 1.2rem; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input, select { background: #252525; color: white; border: 1px solid #444; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .day-box { background: #2d3436; margin: 5px 0; padding: 10px; border-radius: 5px; cursor: pointer; }
        .content { display: none; padding: 10px; background: #1a1a1a; font-size: 0.9rem; }
        .ex-img { width: 100%; max-width: 150px; border-radius: 5px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">Smart Gym-<span>24x</span></h1>
</div>

<div class="card">
    <h3>📊 BMI Calculator</h3>
    <div class="grid">
        <input type="number" id="wt" placeholder="Weight (kg)">
        <input type="number" id="ht" placeholder="Height (cm)">
    </div>
    <button onclick="calculateBMI()">Check Health</button>
    <p id="bmiResult" style="text-align:center; font-weight:bold; color:var(--accent);"></p>
</div>

<div class="card">
    <h3>📅 Workout Schedule</h3>
    <select id="myGoal" onchange="showSchedule()">
        <option value="bulking">Bulking</option>
        <option value="cutting">Weight Loss</option>
    </select>
    <div id="scheduleArea"></div>
</div>

<div class="card">
    <h3>💪 Exercise Guide</h3>
    <div class="grid">
        <button style="background:#444;" onclick="showExercise('chest')">Chest</button>
        <button style="background:#444;" onclick="showExercise('bicep')">Bicep</button>
    </div>
    <div id="exerciseDisplay" style="text-align:center;"></div>
</div>

<script>
    function calculateBMI() {
        const w = document.getElementById('wt').value;
        const h = document.getElementById('ht').value / 100;
        if(w && h) {
            const bmi = (w / (h * h)).toFixed(1);
            document.getElementById('bmiResult').innerText = "Your BMI: " + bmi;
        }
    }

    function showSchedule() {
        const goal = document.getElementById('myGoal').value;
        const days = ["Monday", "Tuesday", "Wednesday"];
        let html = "";
        days.forEach((d, i) => {
            html += `<div class="day-box" onclick="toggle('${i}')">${d} ▼</div>
                     <div id="box${i}" class="content">${goal === 'bulking' ? 'Heavy Weight Training' : 'High Intensity Cardio'}</div>`;
        });
        document.getElementById('scheduleArea').innerHTML = html;
    }

    function toggle(id) {
        const x = document.getElementById('box' + id);
        x.style.display = (x.style.display === "block") ? "none" : "block";
    }

    function showExercise(type) {
        const area = document.getElementById('exerciseDisplay');
        if(type === 'chest') {
            area.innerHTML = "<h4>Flat Bench Press</h4><img src='https://i.ibb.co/G38QLCHG/flate-bench-press.jpg' class='ex-img'>";
        } else {
            area.innerHTML = "<h4>Barbell Curl</h4><img src='https://i.ibb.co/jpLwxZv/barbell-curl.jpg' class='ex-img'>";
        }
    }

    window.onload = showSchedule;
</script>

</body>
</html>
