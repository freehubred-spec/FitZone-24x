<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone-24x | Ultimate Guide</title>
    <style>
        :root { --primary: #ff4757; --dark: #0f0f0f; --card-bg: #1e1e1e; --accent: #2ecc71; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 50px; }
        .header { text-align: center; padding: 25px 10px; background: #000; border-bottom: 3px solid var(--primary); }
        .logo-text { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .logo-text span { color: var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #252525; color: white; border: 1px solid var(--primary); font-size: 1rem; }

        /* Workout Menu */
        .day-wrapper { margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .day-header { background: #2d3436; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .day-content { display: none; background: #1a1a1a; padding: 10px; }
        
        .category-label { color: var(--primary); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin: 10px 0 5px 5px; display: block; border-left: 3px solid var(--primary); padding-left: 8px; }
        .exercise-item { display: flex; align-items: center; background: #252525; margin-bottom: 8px; padding: 10px; border-radius: 8px; }
        .ex-img { width: 75px; height: 75px; border-radius: 6px; object-fit: cover; background: #333; margin-right: 12px; border: 1px solid #444; }
        .ex-name { font-size: 0.9rem; font-weight: bold; color: #fff; }
        .ex-reps { font-size: 0.75rem; color: var(--accent); display: block; margin-top: 3px; }

        .cardio-box { text-align: center; padding: 20px; background: rgba(255, 71, 87, 0.1); border: 1px dashed var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">FitZone-<span>24x</span></div>
</div>

<div class="container">

    <div class="card">
        <h3 style="margin-top:0;">🎯 Select Your Goal</h3>
        <select id="goalSelect" onchange="refreshWorkout()">
            <option value="bulking">Bulking (Muscle Gain)</option>
            <option value="weightloss">Weight Loss (Fat Burn)</option>
            <option value="cutting">Cutting Body (Max Cardio)</option>
        </select>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">📅 Weekly Workout Schedule</h3>
        <div id="workoutMenu">
            </div>
    </div>

</div>

<script>
    const exercises = {
        chest: [
            {n: "Incline Bench Press", p: "https://via.placeholder.com/75?text=Incline"},
            {n: "Decline Bench Press", p: "https://via.placeholder.com/75?text=Decline"},
            {n: "Flat Bench Press", p: "https://via.placeholder.com/75?text=Flat"},
            {n: "Chest Fly Machine", p: "https://via.placeholder.com/75?text=Fly"},
            {n: "Parallel Bar Dips", p: "https://via.placeholder.com/75?text=Dips"},
            {n: "Heavyweight Lifting", p: "https://via.placeholder.com/75?text=Heavy"}
        ],
        tricep: [
            {n: "Pulley Push Down", p: "https://via.placeholder.com/75?text=Pulley"},
            {n: "Close Grip Bench Press", p: "https://via.placeholder.com/75?text=CloseGrip"},
            {n: "Rope Push Down", p: "https://via.placeholder.com/75?text=Rope"},
            {n: "Reverse Triceps Push Down", p: "https://via.placeholder.com/75?text=Reverse"}
        ],
        back: [
            {n: "Pull Ups", p: "https://via.placeholder.com/75?text=PullUps"},
            {n: "Wide Grip Pull", p: "https://via.placeholder.com/75?text=WideGrip"},
            {n: "T-Bar Row", p: "https://via.placeholder.com/75?text=TBar"},
            {n: "Barbell Rows", p: "https://via.placeholder.com/75?text=Rows"},
            {n: "Cable Row", p: "https://via.placeholder.com/75?text=Cable"},
            {n: "Deadlifts", p: "https://via.placeholder.com/75?text=Deadlift"}
        ],
        bicep: [
            {n: "Barbell Curl", p: "https://via.placeholder.com/75?text=Barbell"},
            {n: "Dumbbell Curls", p: "https://via.placeholder.com/75?text=Dumbbell"},
            {n: "Preacher Curl", p: "https://via.placeholder.com/75?text=Preacher"},
            {n: "Concentration Curl", p: "https://via.placeholder.com/75?text=Concentrate"},
            {n: "Hammer Curl", p: "https://via.placeholder.com/75?text=Hammer"}
        ],
        legs: [
            {n: "Barbell Squats", p: "https://via.placeholder.com/75?text=Squats"},
            {n: "Leg Extension", p: "https://via.placeholder.com/75?text=LegEx"},
            {n: "Hamstring Curls", p: "https://via.placeholder.com/75?text=Hamstring"},
            {n: "Calf Extension", p: "https://via.placeholder.com/75?text=Calf"}
        ],
        shoulder: [
            {n: "Dumbbell Shoulder Press", p: "https://via.placeholder.com/75?text=ShoulderPress"},
            {n: "Lateral Raises", p: "https://via.placeholder.com/75?text=Lateral"},
            {n: "Bent Over Flys", p: "https://via.placeholder.com/75?text=BentFly"},
            {n: "Shrugs", p: "https://via.placeholder.com/75?text=Shrugs"},
            {n: "Upright Rows", p: "https://via.placeholder.com/75?text=Upright"}
        ]
    };

    function toggle(id) {
        let x = document.getElementById(id);
        x.style.display = (x.style.display === "block") ? "none" : "block";
    }

    function getExHtml(catName, list, reps) {
        let h = `<span class="category-label">${catName}</span>`;
        list.forEach(ex => {
            h += `<div class="exercise-item">
                <img src="${ex.p}" class="ex-img">
                <div><span class="ex-name">${ex.n}</span><span class="ex-reps">${reps}</span></div>
            </div>`;
        });
        return h;
    }

    function refreshWorkout() {
        const goal = document.getElementById('goalSelect').value;
        const menu = document.getElementById('workoutMenu');
        menu.innerHTML = "";

        if(goal === 'cutting') {
            menu.innerHTML = `<div class="cardio-box"><h3>🔥 Cutting Mode</h3><p>Isme aap koi bhi workout karein, lekin <b>Cardio (Running, Cycling, Skipping)</b> ko maximum rakhein.</p><p>Har session ke baad 20-30 min cardio zaroori hai.</p></div>`;
            return;
        }

        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        let schedule = [];

        if(goal === 'bulking') {
            schedule = [
                {title: "Chest & Tricep", cats: ["chest", "tricep"], reps: "4 Sets x 8-10 Reps (Heavy)"},
                {title: "Back & Biceps", cats: ["back", "bicep"], reps: "4 Sets x 8-10 Reps (Heavy)"},
                {title: "Legs & Shoulder", cats: ["legs", "shoulder"], reps: "4 Sets x 10-12 Reps (Heavy)"},
                {title: "Chest & Tricep", cats: ["chest", "tricep"], reps: "4 Sets x 8-10 Reps (Heavy)"},
                {title: "Back & Biceps", cats: ["back", "bicep"], reps: "4 Sets x 8-10 Reps (Heavy)"},
                {title: "Legs & Shoulder", cats: ["legs", "shoulder"], reps: "4 Sets x 10-12 Reps (Heavy)"}
            ];
        } else {
            schedule = [
                {title: "Only Chest", cats: ["chest"], reps: "3 Sets x 15-20 Reps (Light)"},
                {title: "Only Back", cats: ["back"], reps: "3 Sets x 15-20 Reps (Light)"},
                {title: "Only Biceps", cats: ["bicep"], reps: "3 Sets x 15-20 Reps (Light)"},
                {title: "Only Tricep", cats: ["tricep"], reps: "3 Sets x 15-20 Reps (Light)"},
                {title: "Only Shoulder", cats: ["shoulder"], reps: "3 Sets x 15-20 Reps (Light)"},
                {title: "Only Legs", cats: ["legs"], reps: "3 Sets x 15-20 Reps (Light)"}
            ];
        }

        days.forEach((day, i) => {
            let dayId = "day" + i;
            let content = "";
            schedule[i].cats.forEach(cat => {
                content += getExHtml(cat, exercises[cat], schedule[i].reps);
            });

            menu.innerHTML += `
                <div class="day-wrapper">
                    <div class="day-header" onclick="toggle('${dayId}')">${day}: ${schedule[i].title} <span>▼</span></div>
                    <div id="${dayId}" class="day-content">${content}</div>
                </div>`;
        });
    }

    refreshWorkout();
</script>

</body>
</html>
